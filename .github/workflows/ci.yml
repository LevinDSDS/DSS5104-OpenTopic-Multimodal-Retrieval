name: aitr-ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install CPU-only PyTorch + deps
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
              "torch>=2.0" "torchvision>=0.15"
          pip install numpy pyyaml tqdm pytest pillow

      - name: Unit tests (IDF / IDE / CSA / loss)
        run: pytest tests/test_idf_ide.py tests/test_cross_scale.py tests/test_loss.py -v

      - name: Generate synthetic precomp/ (toy dataset)
        run: |
          python data/make_toy_precomp.py \
              --out       data/toy_precomp/flickr30k \
              --n_train   64  --n_dev 16  --n_test 16 \
              --include_testall

      - name: End-to-end smoke -- 1 training step on toy precomp
        run: |
          python - <<'PY'
          import sys, yaml, torch
          sys.path.insert(0, '.')
          from aitr import AITR, AITRConfig, TripletRankingLoss
          from data import get_loaders, build_or_load_vocab

          cfg = yaml.safe_load(open('configs/toy_bigru.yaml'))
          caps = [c.strip() for c in
                  open('data/toy_precomp/flickr30k/precomp/train_caps.txt')]
          vocab = build_or_load_vocab(
              'data/toy_precomp/flickr30k/vocab.json',
              sentences=caps, min_freq=1)

          loaders = get_loaders(cfg, vocab, None)
          m = cfg['model']
          model = AITR(AITRConfig(
              img_in_dim=m['img_in_dim'], embed_dim=m['embed_dim'],
              text_encoder=cfg['text_encoder'], vocab_size=len(vocab),
              n_proto=m['n_proto'], tau=m['tau'],
              csa_windows=tuple(m['csa_windows']),
              csa_strides=tuple(m['csa_strides']),
              csa_alpha=m['csa_alpha'], csa_top_pairs=m['csa_top_pairs'],
              z_balanced=m['z_balanced'], z_unbalanced=m['z_unbalanced'],
              lambdas=tuple(m['lambdas'])))
          model.train()

          criterion = TripletRankingLoss(margin=cfg['optim']['margin'])
          l1, l2, l3 = m['lambdas']
          for step, (regions, text_args, _) in enumerate(loaders[0]):
              out = model(regions, text_args)
              sim = l1 * out['s_ini_mat'] + l2 * out['s_ins_mat']
              loss = criterion(sim) - l3 * out['s_fra_diag'].mean()
              loss.backward()
              print(f'step {step}  loss {loss.item():.4f}')
              if step >= 1:
                  break
          print('smoke train OK')
          PY

      - name: Feature extraction tests (bottom_up + bundle)
        run: pytest tests/test_extract_features.py tests/test_extract_clip.py -v

      - name: verify_precomp on the toy dataset
        run: |
          python -m data.verify_precomp \
              --precomp data/toy_precomp/flickr30k/precomp
